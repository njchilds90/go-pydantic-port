name: Go
on: [push, pull_request]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Go environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.20'
      - name: Run tests
        run: go test -race ./...
      - name: Run lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: '1.52.2'
